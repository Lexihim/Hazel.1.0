<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazel AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <nav>
            <img src="logo.svg" alt="Hazel Logo" width="40">
            <span>Hazel <strong>v1.0</strong></span>
        </nav>
        <div id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Ask Hazel anything...">
            <button onclick="askHazel()">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
